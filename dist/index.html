            /* Minimal loading styles */
            #root {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .loading-container {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 1rem;
            }

            .loading-spinner {
                width: 2rem;
                height: 2rem;
                border: 2px solid #e5e7eb;
                border-top: 2px solid #3b82f6;
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }

            .loading-text {
                color: #6b7280;
                font-family:
                    system-ui,
                    -apple-system,
                    sans-serif;
                font-size: 0.875rem;
            }

            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }

            /* Hide loading once React hydrates */
            #root:not(:empty) .loading-container {
                display: none;
            }

            /* Dark mode support */
            @media (prefers-color-scheme: dark) {
                body {
                    background-color: #0f172a;
                    color: #f8fafc;
                }
                .loading-spinner {
                    border-color: #374151;
                    border-top-color: #60a5fa;
                }
                .loading-text {
                    color: #9ca3af;
                }
            }
        </style>
